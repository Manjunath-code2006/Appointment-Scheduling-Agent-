# ============================================================
# DEV profile — H2 in-memory database (no MySQL required)
# ============================================================
spring.datasource.url=jdbc:h2:mem:appointmentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# Disable Flyway in dev — JPA creates schema from entities
spring.flyway.enabled=false

# H2 web console (access at http://localhost:8080/api/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JWT
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Mail — completely disabled in dev (JavaMailSender not auto-configured)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# Frontend URL
app.frontend.url=http://localhost:5173
app.name=Appointment Agent

# Logging
logging.level.com.appointmentagent=DEBUG
logging.level.org.springframework.security=WARN
